version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_agent_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=default-dev-secret-key-for-local-compose-runs
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_agent_worker
    command: celery -A backend.jobs.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=default-dev-secret-key-for-local-compose-runs
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

volumes:
  redis_data:
